# Render Blueprint -- https://render.com/docs/blueprint-spec
# Deploy: connect this repo on Render and it picks this file up automatically,
# or `render blueprint launch` from the CLI. Free tier: sleeps after 15 min of
# inactivity, ~30-50s cold start on the next request -- see
# .github/workflows/keep-warm.yml for the mitigation.
services:
  - type: web
    name: graphrag-agent-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CORS_ORIGINS
        # Placeholder until the Phase 3 frontend is deployed -- update this to
        # the Vercel URL then, or the frontend's requests will be CORS-blocked.
        value: http://localhost:3000
      - key: GROQ_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ARANGO_HOST
        sync: false
      - key: ARANGO_USER
        sync: false
      - key: ARANGO_PASS
        sync: false
      - key: ARANGO_DB
        sync: false
