# Render Blueprint -- https://render.com/docs/blueprint-spec
# Deploy: connect this repo on Render and it picks this file up automatically,
# or `render blueprint launch` from the CLI. Free tier: sleeps after 15 min of
# inactivity, ~30-50s cold start on the next request -- see
# .github/workflows/keep-warm.yml for the mitigation.
services:
  - type: web
    name: graphrag-agent-api
    runtime: python
    plan: free
    region: oregon
    # The second command pre-downloads the encoder into the HuggingFace cache
    # at build time, not on the first live request. Without this, every cold
    # start (and every restart -- see the HF_HUB_OFFLINE comment below) made
    # ~20 sequential, unauthenticated HTTPS calls to huggingface.co (HEAD +
    # redirect + GET per model file) to load sentence-transformers/all-MiniLM-
    # L6-v2, taking 4+ minutes -- observed directly in Render's logs holding
    # /query open that whole time while memory pressure climbed, then getting
    # silently OOM-killed right as the load finished, before it could ever
    # answer or cache anything. Render's native-runtime build output persists
    # onto the same instance's disk for that deploy, so this cache survives
    # ordinary process restarts within a deploy (though not a fresh deploy).
    # The third command prewarms the ONNX export + tokenizer that the
    # KGQA_ENCODER=onnx runtime path (below) actually loads. The
    # sentence-transformers prewarm is kept even though the torch path is
    # normally dormant here: it is the rollback safety net -- unsetting
    # KGQA_ENCODER must land on a torch path whose files exist locally,
    # or it would die under HF_HUB_OFFLINE=1 with LocalEntryNotFoundError.
    buildCommand: >-
      pip install -r backend/requirements.txt &&
      python -c "from sentence_transformers import SentenceTransformer;
      SentenceTransformer('sentence-transformers/all-MiniLM-L6-v2')" &&
      python -c "from huggingface_hub import hf_hub_download;
      hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'onnx/model.onnx');
      hf_hub_download('sentence-transformers/all-MiniLM-L6-v2', 'tokenizer.json')"
    # HF_HUB_OFFLINE=1 is set only here (runtime), not as a service-wide
    # envVar -- envVars apply to the build step too, and setting it globally
    # made the buildCommand's own prewarm download fail (offline mode was
    # already blocking network access before the cache existed to be
    # offline from -- the first deploy attempt with this file failed for
    # exactly that reason). Scoping it to startCommand keeps the build step
    # free to fetch the model while runtime never revalidates that cache
    # over the network (the slow, rate-limited HEAD-request chain described
    # above), so a restart loads the encoder from local disk in well under a
    # second instead of minutes.
    startCommand: HF_HUB_OFFLINE=1 uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # The build-time prewarm above landed the model in the *default*
      # HuggingFace cache (~/.cache/huggingface, resolved from $HOME) -- but
      # Render's build step and the running instance don't share that
      # directory (confirmed live: the deployed app raised
      # LocalEntryNotFoundError, unable to find files the build step had
      # just downloaded seconds earlier). Only the project directory itself
      # persists from build into runtime (that's why .venv survives).
      # Pointing HF_HOME at a path inside the project directory -- instead
      # of relying on the default HOME-based location -- makes the
      # buildCommand's download and the runtime load agree on where the
      # cache lives. Verified locally: downloading with this HF_HOME and
      # then reloading with HF_HUB_OFFLINE=1 from that same path makes zero
      # network calls and succeeds.
      - key: HF_HOME
        value: .render-cache/huggingface
      # Torch-free ONNX encoder (same weights, same 384-dim vector space, so
      # the vectors already in Neo4j still work -- see
      # src/kgqa/models.py:OnnxEncoder). This is what makes the demo fit:
      # measured locally, encoder + demo store is ~700MB on the torch path vs
      # ~290MB on this one, against 512MB here -- torch was never going to
      # fit, which is the OOM that kept killing /query mid-request even after
      # the caching fixes above. Unset to roll back to the torch path (still
      # installed and prewarmed above exactly for that reason).
      # NOTE: like CORS_ORIGINS below, Render does NOT auto-sync this from
      # render.yaml on an existing service -- mirror it into the dashboard's
      # Environment tab by hand.
      - key: KGQA_ENCODER
        value: onnx
      # Render's free plan is 512MB RAM -- loading both the encoder and the
      # cross-encoder reranker (each a full torch model) OOM-killed the
      # instance in practice. Skip the reranker on this tier; retrievers
      # already degrade gracefully to raw top-k without one (see
      # BaseRetriever._select). Unset/remove this if upgrading to a plan
      # with more memory.
      - key: KGQA_SKIP_RERANKER
        value: "true"
      # When Neo4j/ArangoDB is unreachable, the service's default behavior is
      # to degrade to encoding the labeled split locally -- a bounded escape
      # hatch meant for local dev (see its docstring: "slow -- not for
      # production"). On this 512MB tier that fallback is slow and
      # memory-hungry enough to crash the worker instead of degrading
      # gracefully, and since the crash happens before the encoded store gets
      # cached, every retry repeats the same doomed multi-minute encode. This
      # turns that crash-loop into an immediate, clean error, so a graph DB
      # outage (e.g. the AuraDB free-tier instance auto-pausing/expiring from
      # inactivity) fails fast instead of taking the whole instance down.
      - key: KGQA_DISABLE_DATASET_FALLBACK
        value: "true"
      # Limits BLAS/OMP thread pools so torch/numpy don't each spin up one
      # thread per core, which multiplies memory on shared/limited hosts.
      - key: OMP_NUM_THREADS
        value: "1"
      - key: TOKENIZERS_PARALLELISM
        value: "false"
      - key: CORS_ORIGINS
        # localhost:3123 is this project's own dev port (see .claude/launch.json);
        # localhost:3000 is plain `npm run dev`'s default; the vercel.app URL is
        # the deployed frontend (frontend/, Vercel project "graphrag-pubmedqa-ablation").
        # NOTE: Render doesn't auto-sync this plain `value:` field from render.yaml
        # on an existing service -- mirror any change here into the dashboard's
        # Environment tab by hand too.
        value: http://localhost:3000,http://localhost:3123,https://graphrag-pubmedqa-ablation.vercel.app
      - key: GEMINI_API_KEY
        sync: false
      - key: ARANGO_HOST
        sync: false
      - key: ARANGO_USER
        sync: false
      - key: ARANGO_PASS
        sync: false
      - key: ARANGO_DB
        sync: false
      # The demo graph (graph_id="demo") -- see scripts/ingest_neo4j.py.
      # Separate from the ArangoDB vars above, which are for the benchmarked
      # ablation / any real dataset a future /ingest builds.
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        sync: false
      - key: NEO4J_PASSWORD
        sync: false
